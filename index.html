<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Добро пожаловать</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
            transition: opacity 0.4s ease;
        }

        /* Aurora background */
        .aurora {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: 0;
        }

        .blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.6;
        }

        .blob:nth-child(1) {
            width: 500px;
            height: 500px;
            background: linear-gradient(135deg, #8b5cf6, #a855f7);
            top: -200px;
            right: -200px;
            animation: drift1 20s ease-in-out infinite;
        }

        .blob:nth-child(2) {
            width: 400px;
            height: 400px;
            background: linear-gradient(135deg, #ec4899, #f472b6);
            bottom: -150px;
            left: -150px;
            animation: drift2 25s ease-in-out infinite;
        }

        .blob:nth-child(3) {
            width: 300px;
            height: 300px;
            background: linear-gradient(135deg, #06b6d4, #22d3ee);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation: drift3 18s ease-in-out infinite;
        }

        @keyframes drift1 {
            0%, 100% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(-50px, 50px) scale(1.1); }
        }

        @keyframes drift2 {
            0%, 100% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(30px, -30px) scale(1.15); }
        }

        @keyframes drift3 {
            0%, 100% { transform: translate(-50%, -50%) scale(1); }
            50% { transform: translate(-50%, -50%) scale(1.2); }
        }

        /* Noise overlay */
        .noise {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
            opacity: 0.03;
            pointer-events: none;
            z-index: 1;
        }

        /* Vignette */
        .vignette {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, transparent 0%, rgba(0,0,0,0.4) 100%);
            pointer-events: none;
            z-index: 2;
        }

        .container {
            position: relative;
            z-index: 3;
            text-align: center;
            color: #fff;
            padding: 80px 70px;
            background: rgba(20, 20, 20, 0.6);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            box-shadow: 0 0 60px rgba(139, 92, 246, 0.3);
            border: 2px solid transparent;
            background-clip: padding-box;
            animation: fadeInUp 1s ease;
        }

        .container::before {
            content: '';
            position: absolute;
            top: -2px;
            left: -2px;
            right: -2px;
            bottom: -2px;
            background: linear-gradient(135deg, rgba(139, 92, 246, 0.5), rgba(236, 72, 153, 0.5), rgba(6, 182, 212, 0.5));
            border-radius: 24px;
            z-index: -1;
            filter: blur(10px);
            opacity: 0.5;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .eyebrow {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 0.85em;
            color: #a0a0a0;
            margin-bottom: 20px;
            font-weight: 500;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background: #4ade80;
            border-radius: 50%;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(1.2); }
        }

        h1 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 3.5em;
            margin-bottom: 25px;
            font-weight: 700;
            letter-spacing: 4px;
            background: linear-gradient(135deg, #8b5cf6, #ec4899, #06b6d4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            font-size: 1.4em;
            margin-bottom: 50px;
            opacity: 0.8;
            font-weight: 300;
            letter-spacing: 2px;
            color: #e0e0e0;
        }

        .enter-button {
            background: linear-gradient(135deg, #8b5cf6, #a855f7);
            border: none;
            padding: 20px 60px;
            font-size: 1.2em;
            color: white;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 0 30px rgba(139, 92, 246, 0.4);
        }

        .enter-button:hover {
            transform: translateY(-3px);
            box-shadow: 0 0 50px rgba(139, 92, 246, 0.6);
        }

        .enter-button:active {
            transform: translateY(-1px);
        }

        .enter-button svg {
            transition: transform 0.3s ease;
        }

        .enter-button:hover svg {
            transform: translateX(5px);
        }
    </style>
</head>
<body>
    <div class="aurora">
        <div class="blob"></div>
        <div class="blob"></div>
        <div class="blob"></div>
    </div>
    <div class="noise"></div>
    <div class="vignette"></div>

    <div class="container">
        <div class="eyebrow">
            <span class="status-dot"></span>
            <span>online · @whitekrestik</span>
        </div>
        <h1>добро пожаловать</h1>
        <p class="subtitle">начни своё путешествие</p>
        <button class="enter-button" id="enterButton">
            Войти
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M5 12h14M12 5l7 7-7 7"/>
            </svg>
        </button>
    </div>

    <script>
        document.getElementById('enterButton').addEventListener('click', function() {
            document.body.style.opacity = '0';
            setTimeout(() => {
                window.location.href = 'profile.html';
            }, 400);
        });

        history.pushState({}, '', '/');
    </script>
</body>
</html>
