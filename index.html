<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>welcome · @whitekrestik</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #07060d;
            --bg-2: #0d0a1a;
            --violet: #8b5cf6;
            --violet-2: #a78bfa;
            --fuchsia: #e879f9;
            --cyan: #22d3ee;
            --text: #f5f3ff;
            --text-muted: rgba(245, 243, 255, 0.6);
            --glass: rgba(255, 255, 255, 0.04);
            --glass-border: rgba(255, 255, 255, 0.08);
        }

        html, body { height: 100%; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            position: relative;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* Aurora / mesh background */
        .aurora {
            position: fixed;
            inset: 0;
            z-index: 0;
            overflow: hidden;
            pointer-events: none;
        }

        .blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.55;
            mix-blend-mode: screen;
            will-change: transform;
        }

        .blob.b1 {
            width: 520px; height: 520px;
            background: radial-gradient(circle at 30% 30%, #8b5cf6, transparent 60%);
            top: -140px; left: -120px;
            animation: drift1 22s ease-in-out infinite alternate;
        }

        .blob.b2 {
            width: 620px; height: 620px;
            background: radial-gradient(circle at 60% 40%, #e879f9, transparent 60%);
            bottom: -180px; right: -160px;
            animation: drift2 26s ease-in-out infinite alternate;
        }

        .blob.b3 {
            width: 440px; height: 440px;
            background: radial-gradient(circle at 50% 50%, #22d3ee, transparent 60%);
            top: 40%; left: 50%;
            transform: translate(-50%, -50%);
            opacity: 0.35;
            animation: drift3 30s ease-in-out infinite alternate;
        }

        @keyframes drift1 {
            0%   { transform: translate(0, 0) scale(1); }
            100% { transform: translate(80px, 60px) scale(1.1); }
        }
        @keyframes drift2 {
            0%   { transform: translate(0, 0) scale(1); }
            100% { transform: translate(-60px, -40px) scale(1.05); }
        }
        @keyframes drift3 {
            0%   { transform: translate(-50%, -50%) scale(1); }
            100% { transform: translate(-55%, -45%) scale(1.15); }
        }

        /* Grain + vignette overlays */
        .grain {
            position: fixed;
            inset: 0;
            z-index: 1;
            pointer-events: none;
            opacity: 0.06;
            mix-blend-mode: overlay;
            background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='160' height='160'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/></filter><rect width='100%' height='100%' filter='url(%23n)' opacity='1'/></svg>");
        }

        .vignette {
            position: fixed;
            inset: 0;
            z-index: 1;
            pointer-events: none;
            background: radial-gradient(ellipse at center, transparent 40%, rgba(0,0,0,0.6) 100%);
        }

        /* Particles */
        .particles {
            position: fixed;
            inset: 0;
            z-index: 2;
            pointer-events: none;
        }

        .particle {
            position: absolute;
            border-radius: 50%;
            background: rgba(245, 243, 255, 0.6);
            box-shadow: 0 0 8px rgba(167, 139, 250, 0.8);
            animation: float linear infinite;
            will-change: transform, opacity;
        }

        @keyframes float {
            0%   { transform: translateY(105vh) translateX(0); opacity: 0; }
            10%  { opacity: 1; }
            90%  { opacity: 1; }
            100% { transform: translateY(-10vh) translateX(40px); opacity: 0; }
        }

        /* Card */
        .container {
            position: relative;
            z-index: 3;
            text-align: center;
            padding: 72px 64px;
            max-width: 640px;
            width: 100%;
            border-radius: 28px;
            background:
                linear-gradient(180deg, rgba(255,255,255,0.04), rgba(255,255,255,0.015)),
                radial-gradient(120% 120% at 0% 0%, rgba(139,92,246,0.12), transparent 50%),
                radial-gradient(120% 120% at 100% 100%, rgba(232,121,249,0.10), transparent 50%);
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            box-shadow:
                0 30px 80px -20px rgba(0,0,0,0.6),
                0 0 0 1px rgba(255,255,255,0.02) inset,
                0 0 60px -10px rgba(139,92,246,0.25);
            animation: rise 1.1s cubic-bezier(.2,.8,.2,1) both;
        }

        /* Gradient border glow */
        .container::before {
            content: '';
            position: absolute;
            inset: -1px;
            border-radius: 28px;
            padding: 1px;
            background: linear-gradient(135deg, rgba(139,92,246,0.6), rgba(232,121,249,0.35), rgba(34,211,238,0.5));
            -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
            -webkit-mask-composite: xor;
                    mask-composite: exclude;
            opacity: 0.6;
            pointer-events: none;
        }

        @keyframes rise {
            from { opacity: 0; transform: translateY(24px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .eyebrow {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 8px 16px;
            margin-bottom: 28px;
            font-size: 12px;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--text-muted);
            background: rgba(255,255,255,0.04);
            border: 1px solid var(--glass-border);
            border-radius: 999px;
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 500;
        }

        .eyebrow .dot {
            width: 6px; height: 6px; border-radius: 50%;
            background: #22c55e;
            box-shadow: 0 0 10px #22c55e;
            animation: pulseDot 1.6s ease-in-out infinite;
        }

        @keyframes pulseDot {
            0%, 100% { opacity: 1; transform: scale(1); }
            50%      { opacity: 0.5; transform: scale(0.7); }
        }

        h1 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: clamp(2.4rem, 6vw, 4rem);
            font-weight: 600;
            letter-spacing: -0.02em;
            line-height: 1.05;
            margin-bottom: 18px;
            background: linear-gradient(135deg, #ffffff 0%, #c4b5fd 45%, #f0abfc 100%);
            -webkit-background-clip: text;
                    background-clip: text;
            -webkit-text-fill-color: transparent;
            color: transparent;
        }

        .subtitle {
            font-size: 1.05rem;
            margin: 0 auto 44px;
            max-width: 420px;
            color: var(--text-muted);
            font-weight: 300;
            line-height: 1.6;
            letter-spacing: 0.2px;
            animation: rise 1.1s .15s cubic-bezier(.2,.8,.2,1) both;
        }

        /* Button */
        .enter-button {
            --g1: #8b5cf6;
            --g2: #e879f9;
            --g3: #22d3ee;
            position: relative;
            display: inline-flex;
            align-items: center;
            gap: 12px;
            padding: 18px 36px;
            font-family: 'Space Grotesk', sans-serif;
            font-size: 0.95rem;
            font-weight: 500;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: #fff;
            background: linear-gradient(180deg, rgba(255,255,255,0.08), rgba(255,255,255,0.02));
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 999px;
            cursor: pointer;
            overflow: hidden;
            isolation: isolate;
            transition: transform .25s ease, box-shadow .35s ease, border-color .35s ease;
            box-shadow: 0 8px 24px -10px rgba(139,92,246,0.5);
            animation: rise 1.1s .3s cubic-bezier(.2,.8,.2,1) both;
        }

        .enter-button::before {
            content: '';
            position: absolute;
            inset: -1px;
            border-radius: inherit;
            padding: 1px;
            background: linear-gradient(120deg, var(--g1), var(--g2), var(--g3));
            -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
            -webkit-mask-composite: xor;
                    mask-composite: exclude;
            opacity: .85;
        }

        .enter-button::after {
            content: '';
            position: absolute;
            top: 0;
            left: -120%;
            width: 60%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.25), transparent);
            transform: skewX(-20deg);
            transition: left .6s ease;
            z-index: -1;
        }

        .enter-button:hover {
            transform: translateY(-2px);
            border-color: rgba(255,255,255,0.25);
            box-shadow:
                0 14px 40px -10px rgba(139,92,246,0.65),
                0 0 0 1px rgba(255,255,255,0.05);
        }

        .enter-button:hover::after { left: 120%; }
        .enter-button:active { transform: translateY(0) scale(0.98); }

        .enter-button .arrow {
            display: inline-block;
            transition: transform .25s ease;
        }
        .enter-button:hover .arrow { transform: translateX(4px); }

        /* Footer hint */
        .hint {
            position: fixed;
            bottom: 20px;
            left: 0; right: 0;
            text-align: center;
            z-index: 3;
            font-size: 11px;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: rgba(245,243,255,0.35);
            font-family: 'Space Grotesk', sans-serif;
            animation: rise 1.1s .6s cubic-bezier(.2,.8,.2,1) both;
        }

        /* Loading screen */
        .loading-screen {
            position: fixed;
            inset: 0;
            background: var(--bg);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            z-index: 1000;
            transition: opacity .8s ease;
        }

        .loading-screen.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .loading-text {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 13px;
            color: var(--text-muted);
            margin-bottom: 24px;
            letter-spacing: 8px;
            text-transform: uppercase;
            font-weight: 500;
        }

        .loading-bar {
            width: 220px;
            height: 2px;
            background: rgba(255,255,255,0.08);
            border-radius: 2px;
            overflow: hidden;
        }

        .loading-progress {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #8b5cf6, #e879f9, #22d3ee);
            border-radius: 2px;
            animation: loadingProgress 1.6s ease forwards;
        }

        @keyframes loadingProgress { to { width: 100%; } }

        /* Responsive */
        @media (max-width: 560px) {
            .container { padding: 56px 28px; border-radius: 22px; }
            .enter-button { padding: 16px 28px; letter-spacing: 2px; }
        }

        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after { animation: none !important; transition: none !important; }
        }
    </style>
</head>
<body>
    <div class="aurora" aria-hidden="true">
        <div class="blob b1"></div>
        <div class="blob b2"></div>
        <div class="blob b3"></div>
    </div>
    <div class="grain" aria-hidden="true"></div>
    <div class="vignette" aria-hidden="true"></div>
    <div class="particles" id="particles" aria-hidden="true"></div>

    <div class="loading-screen" id="loadingScreen">
        <div class="loading-text">loading</div>
        <div class="loading-bar"><div class="loading-progress"></div></div>
    </div>

    <main class="container">
        <div class="eyebrow"><span class="dot"></span>online · @whitekrestik</div>
        <h1>добро пожаловать</h1>
        <p class="subtitle">Личное пространство, собранное из вайба, неона и поздних ночей. Проходи внутрь — будет красиво.</p>
        <button class="enter-button" id="enterButton" type="button">
            <span>Войти</span>
            <span class="arrow" aria-hidden="true">→</span>
        </button>
    </main>

    <div class="hint">scroll · click · enjoy</div>

    <script>
        function createParticles() {
            const container = document.getElementById('particles');
            const count = 36;
            for (let i = 0; i < count; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                const size = 2 + Math.random() * 4;
                p.style.width = size + 'px';
                p.style.height = size + 'px';
                p.style.left = Math.random() * 100 + '%';
                p.style.animationDuration = (14 + Math.random() * 14) + 's';
                p.style.animationDelay = (-Math.random() * 20) + 's';
                p.style.opacity = String(0.3 + Math.random() * 0.7);
                container.appendChild(p);
            }
        }

        function hideLoader() {
            const ls = document.getElementById('loadingScreen');
            if (ls) ls.classList.add('hidden');
        }

        document.getElementById('enterButton').addEventListener('click', () => {
            document.body.style.transition = 'opacity .4s ease';
            document.body.style.opacity = '0';
            setTimeout(() => { window.location.href = 'profile.html'; }, 380);
        });

        document.addEventListener('DOMContentLoaded', () => {
            createParticles();
            setTimeout(hideLoader, 1200);
        });

        history.pushState({}, '', '/');
    </script>
</body>
</html>
