<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ты не один...</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #000;
            color: #8B0000;
            font-family: 'Courier New', monospace;
            min-height: 100vh;
            overflow: hidden;
            cursor: none;
        }

        .custom-cursor {
            position: fixed;
            width: 30px;
            height: 30px;
            background: radial-gradient(circle, #ff0000 0%, #8B0000 50%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
            z-index: 9999;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.2); opacity: 1; }
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
            text-align: center;
        }

        h1 {
            font-size: 3em;
            margin-bottom: 30px;
            text-shadow: 0 0 10px #ff0000;
            animation: flicker 2s infinite;
        }

        @keyframes flicker {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.8; }
            52% { opacity: 0.2; }
            54% { opacity: 0.9; }
        }

        .message {
            font-size: 1.5em;
            margin: 20px 0;
            opacity: 0;
            animation: fadeIn 3s forwards;
        }

        @keyframes fadeIn {
            to { opacity: 1; }
        }

        .scary-text {
            color: #ff0000;
            font-size: 2em;
            margin: 30px 0;
            text-shadow: 0 0 20px #ff0000;
            animation: glitch 0.5s infinite;
        }

        @keyframes glitch {
            0% { transform: translate(0); }
            20% { transform: translate(-2px, 2px); }
            40% { transform: translate(-2px, -2px); }
            60% { transform: translate(2px, 2px); }
            80% { transform: translate(2px, -2px); }
            100% { transform: translate(0); }
        }

        .button {
            background: #8B0000;
            color: #fff;
            border: 2px solid #ff0000;
            padding: 15px 30px;
            font-size: 1.2em;
            cursor: pointer;
            margin: 20px;
            transition: all 0.3s;
            animation: shake 0.5s infinite;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        .button:hover {
            background: #ff0000;
            box-shadow: 0 0 20px #ff0000;
        }

        .creepy-face {
            font-size: 5em;
            margin: 20px;
            animation: appear 4s infinite;
        }

        @keyframes appear {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }

        .random-message {
            position: fixed;
            color: #ff0000;
            font-size: 1.5em;
            text-shadow: 0 0 10px #ff0000;
            opacity: 0;
            pointer-events: none;
            z-index: 1000;
        }

        .blood-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, transparent 0%, rgba(139, 0, 0, 0.3) 100%);
            pointer-events: none;
            z-index: 100;
            animation: bloodFlow 10s infinite;
        }

        @keyframes bloodFlow {
            0% { opacity: 0.3; }
            50% { opacity: 0.6; }
            100% { opacity: 0.3; }
        }

        .final-message {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #fff;
            font-size: 2em;
            text-align: center;
            z-index: 10000;
        }

        .static-noise {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(
                0deg,
                transparent,
                transparent 2px,
                rgba(0, 0, 0, 0.1) 2px,
                rgba(0, 0, 0, 0.1) 4px
            );
            pointer-events: none;
            z-index: 50;
            animation: static 0.1s infinite;
        }

        @keyframes static {
            0% { transform: translateY(0); }
            100% { transform: translateY(4px); }
        }
    </style>
</head>
<body>
    <div class="custom-cursor" id="cursor"></div>
    <div class="blood-overlay"></div>
    <div class="static-noise"></div>

    <div class="container">
        <h1>Ты не один...</h1>
        <div class="creepy-face">👁️</div>
        <p class="message">Что-то здесь не так...</p>
        <p class="scary-text">Они наблюдают</p>
        <button class="button" id="escapeButton">Попробовать выйти</button>
    </div>

    <div class="final-message" id="finalMessage">
        Это просто шутка...<br>
        Или нет? :)
    </div>

    <script>
        // Аудио контекст для звуков
        const audioContext = new (window.AudioContext || window.webkitAudioContext)();

        // Функция для создания жуткого фонового звука
        function createBackgroundSound() {
            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();

            oscillator.type = 'sawtooth';
            oscillator.frequency.setValueAtTime(50, audioContext.currentTime);
            oscillator.frequency.linearRampToValueAtTime(30, audioContext.currentTime + 5);

            gainNode.gain.setValueAtTime(0.02, audioContext.currentTime);
            gainNode.gain.linearRampToValueAtTime(0.05, audioContext.currentTime + 3);

            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);

            oscillator.start();
            oscillator.stop(audioContext.currentTime + 5);

            // Повторяем каждые 10 секунд
            setTimeout(createBackgroundSound, 10000);
        }

        // Функция для пугающего звука при нажатии на кнопку
        function playScarySound() {
            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();

            oscillator.type = 'square';
            oscillator.frequency.setValueAtTime(200, audioContext.currentTime);
            oscillator.frequency.exponentialRampToValueAtTime(50, audioContext.currentTime + 0.5);

            gainNode.gain.setValueAtTime(0.3, audioContext.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.5);

            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);

            oscillator.start();
            oscillator.stop(audioContext.currentTime + 0.5);
        }

        // Функция для звука при появлении сообщений
        function playWhisperSound() {
            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();
            const filter = audioContext.createBiquadFilter();

            oscillator.type = 'sine';
            oscillator.frequency.setValueAtTime(800 + Math.random() * 400, audioContext.currentTime);

            filter.type = 'lowpass';
            filter.frequency.setValueAtTime(1000, audioContext.currentTime);

            gainNode.gain.setValueAtTime(0.05, audioContext.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 1);

            oscillator.connect(filter);
            filter.connect(gainNode);
            gainNode.connect(audioContext.destination);

            oscillator.start();
            oscillator.stop(audioContext.currentTime + 1);
        }

        // Функция для звука при блокировке клавиш
        function playBlockedKeySound() {
            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();

            oscillator.type = 'triangle';
            oscillator.frequency.setValueAtTime(150, audioContext.currentTime);
            oscillator.frequency.linearRampToValueAtTime(100, audioContext.currentTime + 0.3);

            gainNode.gain.setValueAtTime(0.2, audioContext.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.3);

            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);

            oscillator.start();
            oscillator.stop(audioContext.currentTime + 0.3);
        }

        // Запускаем фоновый звук при первом взаимодействии
        let audioStarted = false;
        function startAudio() {
            if (!audioStarted) {
                audioContext.resume();
                createBackgroundSound();
                audioStarted = true;
            }
        }

        document.addEventListener('click', startAudio);
        document.addEventListener('mousemove', startAudio);
        document.addEventListener('keydown', startAudio);

        // Кастомный курсор
        const cursor = document.getElementById('cursor');
        document.addEventListener('mousemove', (e) => {
            cursor.style.left = e.clientX - 15 + 'px';
            cursor.style.top = e.clientY - 15 + 'px';
        });

        // Случайные пугающие сообщения
        const scaryMessages = [
            "Ты чувствуешь это?",
            "Они здесь",
            "Не оглядывайся",
            "Слишком поздно",
            "Тебя видят",
            "Беги...",
            "Оно приближается",
            "Закрой глаза",
            "Ты не один",
            "Слышишь это?"
        ];

        function showRandomMessage() {
            playWhisperSound();
            const message = document.createElement('div');
            message.className = 'random-message';
            message.textContent = scaryMessages[Math.floor(Math.random() * scaryMessages.length)];
            message.style.left = Math.random() * 80 + 10 + '%';
            message.style.top = Math.random() * 80 + 10 + '%';
            document.body.appendChild(message);

            setTimeout(() => {
                message.style.opacity = '1';
                setTimeout(() => {
                    message.style.opacity = '0';
                    setTimeout(() => message.remove(), 1000);
                }, 2000);
            }, 100);
        }

        // Показываем сообщения каждые 5-8 секунд
        setInterval(showRandomMessage, 5000 + Math.random() * 3000);

        // Кнопка "попробовать выйти"
        const escapeButton = document.getElementById('escapeButton');
        escapeButton.addEventListener('click', () => {
            playScarySound();
            document.body.style.animation = 'shake 0.5s';
            setTimeout(() => {
                document.body.style.animation = '';
                const warning = document.createElement('div');
                warning.style.cssText = `
                    position: fixed;
                    top: 50%;
                    left: 50%;
                    transform: translate(-50%, -50%);
                    color: #ff0000;
                    font-size: 2em;
                    text-shadow: 0 0 20px #ff0000;
                    z-index: 10000;
                    text-align: center;
                    animation: glitch 0.3s infinite;
                `;
                warning.innerHTML = 'ПИШИ @whitekrestik<br><span style="font-size: 0.6em; color: #8B0000;">...пока не поздно</span>';
                document.body.appendChild(warning);
                setTimeout(() => warning.remove(), 3000);
            }, 500);
        });

        // Блокировка Esc и Backspace
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' || e.key === 'Backspace') {
                e.preventDefault();
                playBlockedKeySound();
                const warning = document.createElement('div');
                warning.style.cssText = `
                    position: fixed;
                    top: 50%;
                    left: 50%;
                    transform: translate(-50%, -50%);
                    color: #ff0000;
                    font-size: 3em;
                    text-shadow: 0 0 20px #ff0000;
                    z-index: 10000;
                `;
                warning.textContent = 'Поздно...';
                document.body.appendChild(warning);
                setTimeout(() => warning.remove(), 2000);
            }
        });

        // Финальное сообщение через 30 секунд
        setTimeout(() => {
            document.querySelector('.container').style.display = 'none';
            document.querySelector('.blood-overlay').style.display = 'none';
            document.querySelector('.static-noise').style.display = 'none';
            document.getElementById('finalMessage').style.display = 'block';
            document.body.style.backgroundColor = '#000';
        }, 30000);

        // Эффект "ломания" сайта через 20 секунд
        setTimeout(() => {
            document.body.style.animation = 'glitch 0.3s infinite';
            document.querySelectorAll('*').forEach(el => {
                el.style.filter = 'hue-rotate(' + Math.random() * 360 + 'deg)';
            });
        }, 20000);
    </script>
</body>
</html>
