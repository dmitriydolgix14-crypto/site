<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Добро пожаловать</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        .container {
            position: relative;
            z-index: 1;
            text-align: center;
            color: #fff;
            padding: 60px;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            box-shadow: 0 0 100px rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            animation: fadeIn 1.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 {
            font-size: 3em;
            margin-bottom: 20px;
            font-weight: 300;
            letter-spacing: 8px;
            text-transform: uppercase;
        }

        .subtitle {
            font-size: 1.2em;
            margin-bottom: 50px;
            opacity: 0.6;
            font-weight: 300;
            letter-spacing: 3px;
        }

        .enter-button {
            background: transparent;
            color: #fff;
            border: 2px solid #fff;
            padding: 18px 50px;
            font-size: 1.1em;
            cursor: pointer;
            transition: all 0.4s ease;
            font-weight: 300;
            letter-spacing: 4px;
            text-transform: uppercase;
            position: relative;
            overflow: hidden;
        }

        .enter-button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: #fff;
            transition: left 0.4s ease;
            z-index: -1;
        }

        .enter-button:hover {
            color: #000;
        }

        .enter-button:hover::before {
            left: 0;
        }

        .enter-button:active {
            transform: scale(0.98);
        }

        /* Загрузочный экран */
        .loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            flex-direction: column;
            transition: opacity 0.8s ease;
        }

        .loading-screen.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .loading-text {
            font-size: 1.5em;
            color: #fff;
            margin-bottom: 40px;
            letter-spacing: 8px;
            text-transform: uppercase;
            font-weight: 300;
        }

        .loading-bar {
            width: 200px;
            height: 2px;
            background: rgba(255, 255, 255, 0.1);
            position: relative;
        }

        .loading-progress {
            height: 100%;
            background: #fff;
            animation: loadingProgress 2s ease forwards;
            width: 0%;
        }

        @keyframes loadingProgress {
            to { width: 100%; }
        }

        /* Декоративные элементы */
        .decoration {
            position: fixed;
            width: 300px;
            height: 300px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 50%;
            animation: rotate 20s linear infinite;
        }

        .decoration:nth-child(1) {
            top: -150px;
            right: -150px;
        }

        .decoration:nth-child(2) {
            bottom: -150px;
            left: -150px;
            animation-direction: reverse;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="decoration"></div>
    <div class="decoration"></div>

    <div class="container">
        <h1>Добро пожаловать</h1>
        <p class="subtitle">начни путешествие</p>

        <button class="enter-button" id="enterButton">
            Войти
        </button>
    </div>

    <script>
        // Переход на профиль
        document.getElementById('enterButton').addEventListener('click', function() {
            window.location.href = 'profile.html';
        });

        // Изменяем URL без перезагрузки
        history.pushState({}, '', '/');
    </script>
</body>
</html>
