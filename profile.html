<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile · @whitekrestik</title>
    <link rel="icon" type="image/jpeg" href="иконка.jpg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Unbounded:wght@500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg:        #050308;
            --bg-card:   #0a0710;
            --ink:       #f3f0f7;
            --ink-muted: rgba(243, 240, 247, 0.58);
            --ink-dim:   rgba(243, 240, 247, 0.35);
            --blood:     #ef4444;
            --blood-hi:  #f87171;
            --blood-low: #7f1d1d;
            --violet:    #8b5cf6;
            --line:      rgba(255, 255, 255, 0.07);
        }

        html, body { height: 100%; }

        body {
            background: var(--bg);
            color: var(--ink);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            position: relative;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* --- dark atmospheric background --- */
        .aurora { position: fixed; inset: 0; z-index: 0; overflow: hidden; pointer-events: none; }

        .blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(100px);
            opacity: 0.45;
            mix-blend-mode: screen;
            will-change: transform;
        }
        .blob.b1 {
            width: 520px; height: 520px;
            background: radial-gradient(circle at 40% 40%, #7f1d1d, transparent 65%);
            top: -180px; right: -120px;
            animation: drift1 28s ease-in-out infinite alternate;
        }
        .blob.b2 {
            width: 600px; height: 600px;
            background: radial-gradient(circle at 50% 40%, #581c87, transparent 65%);
            bottom: -220px; left: -160px;
            animation: drift2 32s ease-in-out infinite alternate;
        }
        .blob.b3 {
            width: 420px; height: 420px;
            background: radial-gradient(circle at 50% 50%, #1e1b4b, transparent 60%);
            top: 55%; left: 45%;
            transform: translate(-50%, -50%);
            opacity: 0.4;
            animation: drift3 40s ease-in-out infinite alternate;
        }
        @keyframes drift1 { to { transform: translate(-60px, 50px) scale(1.1); } }
        @keyframes drift2 { to { transform: translate(60px, -40px) scale(1.05); } }
        @keyframes drift3 { to { transform: translate(-45%, -55%) scale(1.15); } }

        /* heavy film grain */
        .grain {
            position: fixed; inset: 0; z-index: 1; pointer-events: none; opacity: 0.12; mix-blend-mode: overlay;
            background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='220' height='220'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='3' stitchTiles='stitch'/></filter><rect width='100%' height='100%' filter='url(%23n)'/></svg>");
            animation: grainShift 1.2s steps(6) infinite;
        }
        @keyframes grainShift {
            0%   { transform: translate(0,0); }
            20%  { transform: translate(-2%, 1%); }
            40%  { transform: translate(1%, -2%); }
            60%  { transform: translate(-1%, 2%); }
            80%  { transform: translate(2%, -1%); }
            100% { transform: translate(0,0); }
        }

        .vignette {
            position: fixed; inset: 0; z-index: 1; pointer-events: none;
            background: radial-gradient(ellipse at center, transparent 35%, rgba(0,0,0,0.75) 100%);
        }

        /* scanlines */
        .scanlines {
            position: fixed; inset: 0; z-index: 1; pointer-events: none; opacity: 0.18;
            background-image: repeating-linear-gradient(
                to bottom,
                transparent 0,
                transparent 2px,
                rgba(0,0,0,0.4) 2px,
                rgba(0,0,0,0.4) 3px
            );
            mix-blend-mode: multiply;
        }

        /* --- card --- */
        .profile-card {
            position: relative;
            z-index: 3;
            width: 100%;
            max-width: 460px;
            border-radius: 20px;
            overflow: hidden;
            background: var(--bg-card);
            border: 1px solid var(--line);
            box-shadow:
                0 40px 80px -20px rgba(0,0,0,0.7),
                0 0 0 1px rgba(239,68,68,0.12) inset,
                0 0 80px -20px rgba(239,68,68,0.2);
            animation: rise 0.9s cubic-bezier(.2,.8,.2,1) both;
        }

        /* subtle red edge glow */
        .profile-card::before {
            content: '';
            position: absolute;
            inset: -1px;
            border-radius: 20px;
            padding: 1px;
            background: linear-gradient(145deg, rgba(239,68,68,0.55), rgba(139,92,246,0.25) 50%, rgba(239,68,68,0.15));
            -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
            -webkit-mask-composite: xor;
                    mask-composite: exclude;
            opacity: 0.7;
            pointer-events: none;
        }

        @keyframes rise { from {opacity:0; transform:translateY(24px);} to {opacity:1; transform:translateY(0);} }

        /* hero image */
        .hero {
            position: relative;
            width: 100%;
            aspect-ratio: 4 / 5;
            overflow: hidden;
            background: #000;
        }

        .hero-img {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: grayscale(100%) contrast(1.12) brightness(0.82);
            transition: transform 1.2s ease, filter .6s ease;
        }

        .profile-card:hover .hero-img {
            transform: scale(1.03);
            filter: grayscale(85%) contrast(1.18) brightness(0.88);
        }

        .hero-overlay {
            position: absolute;
            inset: 0;
            background:
                linear-gradient(180deg,
                    rgba(5,3,8,0.15) 0%,
                    rgba(5,3,8,0.05) 35%,
                    rgba(5,3,8,0.55) 70%,
                    rgba(5,3,8,0.98) 100%),
                linear-gradient(180deg, rgba(239,68,68,0.0) 50%, rgba(239,68,68,0.08) 100%);
        }

        /* crosshair corners on the hero */
        .corner {
            position: absolute;
            width: 18px; height: 18px;
            border: 1.5px solid rgba(239,68,68,0.9);
            opacity: 0.85;
        }
        .corner.tl { top: 14px; left: 14px; border-right: 0; border-bottom: 0; }
        .corner.tr { top: 14px; right: 14px; border-left: 0; border-bottom: 0; }
        .corner.bl { bottom: 14px; left: 14px; border-right: 0; border-top: 0; }
        .corner.br { bottom: 14px; right: 14px; border-left: 0; border-top: 0; }

        /* red tape chip */
        .tape {
            position: absolute;
            top: 18px;
            left: 50%;
            transform: translateX(-50%) rotate(-1.5deg);
            padding: 5px 14px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 10px;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: #fff;
            background: var(--blood);
            border-radius: 2px;
            box-shadow: 0 6px 18px -6px rgba(239,68,68,0.6);
        }
        .tape::before, .tape::after {
            content: '';
            position: absolute;
            top: 50%; transform: translateY(-50%);
            width: 4px; height: 4px;
            background: rgba(0,0,0,0.35);
            border-radius: 50%;
        }
        .tape::before { left: 5px; }
        .tape::after  { right: 5px; }

        .hero-content {
            position: absolute;
            left: 0; right: 0; bottom: 0;
            padding: 24px 28px 22px;
            z-index: 2;
        }

        .username {
            font-family: 'Unbounded', 'Space Grotesk', sans-serif;
            font-weight: 700;
            font-size: clamp(1.7rem, 5.2vw, 2.1rem);
            letter-spacing: -0.02em;
            line-height: 1;
            color: #fff;
            text-shadow:
                0 2px 10px rgba(0,0,0,0.8),
                1px 0 0 rgba(239,68,68,0.8),
                -1px 0 0 rgba(139,92,246,0.6);
            margin-bottom: 8px;
        }

        .meta-row {
            display: flex;
            align-items: center;
            gap: 10px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 10px;
            letter-spacing: 2.5px;
            text-transform: uppercase;
            color: var(--ink-muted);
        }

        .meta-row .dot {
            width: 6px; height: 6px;
            border-radius: 50%;
            background: var(--blood);
            box-shadow: 0 0 10px var(--blood);
            animation: pulseDot 1.4s ease-in-out infinite;
        }

        .meta-row .sep { opacity: 0.3; }

        @keyframes pulseDot {
            0%, 100% { opacity: 1; transform: scale(1); }
            50%      { opacity: 0.4; transform: scale(0.7); }
        }

        /* body of the card */
        .body {
            padding: 26px 26px 22px;
            position: relative;
        }

        /* watermark number like an archive entry */
        .archive-id {
            position: absolute;
            top: 14px;
            right: 22px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 10px;
            letter-spacing: 2px;
            color: var(--ink-dim);
        }

        .bio {
            font-size: 0.95rem;
            line-height: 1.7;
            color: var(--ink-muted);
            font-weight: 300;
            margin: 12px 0 24px;
            text-align: center;
        }

        .bio .tag {
            display: inline-block;
            margin: 2px;
            padding: 4px 10px;
            color: #fff;
            font-weight: 500;
            font-size: 0.88rem;
            background: linear-gradient(180deg, rgba(239,68,68,0.18), rgba(127,29,29,0.1));
            border: 1px solid rgba(239,68,68,0.35);
            border-radius: 4px;
            font-family: 'JetBrains Mono', monospace;
            letter-spacing: 1px;
            transition: transform .2s ease, border-color .2s ease, background .2s ease;
        }
        .bio .tag:hover {
            transform: translateY(-2px);
            border-color: var(--blood);
            background: linear-gradient(180deg, rgba(239,68,68,0.3), rgba(127,29,29,0.18));
        }

        /* stats */
        .stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 0;
            margin: 0 -4px 22px;
            border-top: 1px solid var(--line);
            border-bottom: 1px solid var(--line);
        }
        .stat-item {
            padding: 14px 6px;
            text-align: center;
            position: relative;
        }
        .stat-item + .stat-item::before {
            content: '';
            position: absolute;
            left: 0; top: 20%; bottom: 20%;
            width: 1px;
            background: var(--line);
        }
        .stat-number {
            font-family: 'Unbounded', sans-serif;
            font-weight: 600;
            font-size: 1.3rem;
            letter-spacing: -0.01em;
            color: #fff;
            margin-bottom: 2px;
        }
        .stat-label {
            font-family: 'JetBrains Mono', monospace;
            font-size: 9px;
            color: var(--ink-dim);
            text-transform: uppercase;
            letter-spacing: 2.5px;
        }

        /* social */
        .social-links {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 22px;
        }
        .social-link {
            position: relative;
            width: 42px;
            height: 42px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            color: #fff;
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--line);
            transition: transform .2s ease, background .25s ease, border-color .25s ease, box-shadow .25s ease;
        }
        .social-link:hover {
            transform: translateY(-3px);
            background: linear-gradient(180deg, rgba(239,68,68,0.22), rgba(127,29,29,0.18));
            border-color: rgba(239,68,68,0.55);
            box-shadow: 0 10px 24px -10px rgba(239,68,68,0.6);
        }
        .social-link svg { width: 17px; height: 17px; }
        .social-link::after {
            content: attr(data-label);
            position: absolute;
            bottom: calc(100% + 6px);
            left: 50%;
            transform: translateX(-50%) translateY(3px);
            font-family: 'JetBrains Mono', monospace;
            font-size: 9px;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--ink-muted);
            background: rgba(10,7,16,0.95);
            border: 1px solid var(--line);
            border-radius: 4px;
            padding: 4px 8px;
            white-space: nowrap;
            opacity: 0;
            pointer-events: none;
            transition: opacity .2s ease, transform .2s ease;
        }
        .social-link:hover::after {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        /* back button */
        .back-button {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 11px 22px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.75rem;
            font-weight: 500;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--ink);
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--line);
            border-radius: 6px;
            cursor: pointer;
            transition: transform .2s ease, background .25s ease, border-color .25s ease;
        }
        .back-button:hover {
            transform: translateY(-2px);
            background: rgba(239,68,68,0.1);
            border-color: rgba(239,68,68,0.5);
        }
        .back-button .arrow { transition: transform .2s ease; }
        .back-button:hover .arrow { transform: translateX(-3px); }

        .actions {
            display: flex;
            justify-content: center;
        }

        @media (max-width: 520px) {
            .profile-card { max-width: 100%; }
            .hero { aspect-ratio: 3 / 4; }
            .body { padding: 22px 20px 20px; }
        }

        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after { animation: none !important; transition: none !important; }
        }
    </style>
</head>
