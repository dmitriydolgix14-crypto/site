<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>@whitekrestik</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #07060d;
            --violet: #8b5cf6;
            --violet-2: #a78bfa;
            --fuchsia: #e879f9;
            --cyan: #22d3ee;
            --text: #f5f3ff;
            --text-muted: rgba(245, 243, 255, 0.62);
            --text-dim: rgba(245, 243, 255, 0.4);
            --glass: rgba(255, 255, 255, 0.04);
            --glass-border: rgba(255, 255, 255, 0.08);
        }

        html, body { height: 100%; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            position: relative;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* Background aurora */
        .aurora {
            position: fixed;
            inset: 0;
            z-index: 0;
            overflow: hidden;
            pointer-events: none;
        }

        .blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(90px);
            opacity: 0.55;
            mix-blend-mode: screen;
            will-change: transform;
        }

        .blob.b1 {
            width: 560px; height: 560px;
            background: radial-gradient(circle at 30% 30%, #8b5cf6, transparent 60%);
            top: -180px; right: -120px;
            animation: drift1 24s ease-in-out infinite alternate;
        }
        .blob.b2 {
            width: 640px; height: 640px;
            background: radial-gradient(circle at 60% 40%, #e879f9, transparent 60%);
            bottom: -220px; left: -160px;
            animation: drift2 28s ease-in-out infinite alternate;
        }
        .blob.b3 {
            width: 480px; height: 480px;
            background: radial-gradient(circle at 50% 50%, #22d3ee, transparent 60%);
            top: 55%; left: 45%;
            transform: translate(-50%, -50%);
            opacity: 0.3;
            animation: drift3 34s ease-in-out infinite alternate;
        }

        @keyframes drift1 { 0% {transform:translate(0,0) scale(1);} 100% {transform:translate(-60px,40px) scale(1.1);} }
        @keyframes drift2 { 0% {transform:translate(0,0) scale(1);} 100% {transform:translate(60px,-40px) scale(1.05);} }
        @keyframes drift3 { 0% {transform:translate(-50%,-50%) scale(1);} 100% {transform:translate(-45%,-55%) scale(1.15);} }

        .grain {
            position: fixed; inset: 0; z-index: 1; pointer-events: none; opacity: 0.06; mix-blend-mode: overlay;
            background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='160' height='160'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/></filter><rect width='100%' height='100%' filter='url(%23n)' opacity='1'/></svg>");
        }
        .vignette {
            position: fixed; inset: 0; z-index: 1; pointer-events: none;
            background: radial-gradient(ellipse at center, transparent 40%, rgba(0,0,0,0.6) 100%);
        }

        .particles { position: fixed; inset: 0; z-index: 2; pointer-events: none; }
        .particle {
            position: absolute; border-radius: 50%;
            background: rgba(245,243,255,0.6);
            box-shadow: 0 0 8px rgba(167,139,250,0.8);
            animation: float linear infinite;
            will-change: transform, opacity;
        }
        @keyframes float {
            0% { transform: translateY(105vh) translateX(0); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-10vh) translateX(40px); opacity: 0; }
        }

        /* Card */
        .profile-card {
            position: relative;
            z-index: 3;
            width: 100%;
            max-width: 520px;
            padding: 56px 44px 40px;
            text-align: center;
            border-radius: 28px;
            background:
                linear-gradient(180deg, rgba(255,255,255,0.04), rgba(255,255,255,0.015)),
                radial-gradient(120% 120% at 0% 0%, rgba(139,92,246,0.14), transparent 50%),
                radial-gradient(120% 120% at 100% 100%, rgba(232,121,249,0.12), transparent 50%);
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            box-shadow:
                0 30px 80px -20px rgba(0,0,0,0.6),
                0 0 60px -10px rgba(139,92,246,0.25);
            animation: rise 1.0s cubic-bezier(.2,.8,.2,1) both;
        }

        .profile-card::before {
            content: '';
            position: absolute;
            inset: -1px;
            border-radius: 28px;
            padding: 1px;
            background: linear-gradient(135deg, rgba(139,92,246,0.6), rgba(232,121,249,0.4), rgba(34,211,238,0.5));
            -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
            -webkit-mask-composite: xor;
                    mask-composite: exclude;
            opacity: 0.6;
            pointer-events: none;
        }

        @keyframes rise { from { opacity: 0; transform: translateY(24px); } to { opacity: 1; transform: translateY(0); } }

        /* Avatar */
        .avatar-container {
            position: relative;
            width: 148px;
            height: 148px;
            margin: 0 auto 28px;
        }

        .avatar-ring {
            position: absolute;
            inset: -8px;
            border-radius: 50%;
            background: conic-gradient(from 0deg, #8b5cf6, #e879f9, #22d3ee, #8b5cf6);
            filter: blur(2px);
            animation: spin 8s linear infinite;
            opacity: 0.85;
        }

        .avatar-ring::after {
            content: '';
            position: absolute;
            inset: 4px;
            border-radius: 50%;
            background: var(--bg);
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .avatar {
            position: relative;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid rgba(255,255,255,0.12);
            filter: saturate(0.9) contrast(1.05);
            transition: transform .4s ease, filter .4s ease;
            z-index: 1;
        }

        .avatar:hover {
            transform: scale(1.03);
            filter: saturate(1.1) contrast(1.1);
        }

        .status-dot {
            position: absolute;
            bottom: 6px;
            right: 6px;
            width: 18px;
            height: 18px;
            background: #22c55e;
            border-radius: 50%;
            border: 3px solid var(--bg);
            z-index: 2;
            box-shadow: 0 0 12px rgba(34, 197, 94, 0.8);
        }

        .status-dot::after {
            content: '';
            position: absolute;
            inset: -4px;
            border-radius: 50%;
            border: 2px solid rgba(34, 197, 94, 0.5);
            animation: statusPulse 1.8s ease-out infinite;
        }

        @keyframes statusPulse {
            0%   { opacity: 1;   transform: scale(0.7); }
            100% { opacity: 0;   transform: scale(1.8); }
        }

        .username {
            font-family: 'Space Grotesk', sans-serif;
            font-size: clamp(1.8rem, 5vw, 2.4rem);
            margin-bottom: 6px;
            font-weight: 600;
            letter-spacing: -0.01em;
            background: linear-gradient(135deg, #ffffff 0%, #c4b5fd 45%, #f0abfc 100%);
            -webkit-background-clip: text;
                    background-clip: text;
            -webkit-text-fill-color: transparent;
            color: transparent;
        }

        .handle-row {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 6px 14px;
            margin-bottom: 24px;
            font-family: 'Space Grotesk', sans-serif;
            font-size: 12px;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--text-muted);
            background: rgba(255,255,255,0.04);
            border: 1px solid var(--glass-border);
            border-radius: 999px;
        }

        .handle-row .dot {
            width: 6px; height: 6px; border-radius: 50%;
            background: #22c55e; box-shadow: 0 0 8px #22c55e;
            animation: pulseDot 1.6s ease-in-out infinite;
        }
        @keyframes pulseDot { 0%,100% {opacity:1;transform:scale(1);} 50% {opacity:.5;transform:scale(.7);} }

        .bio {
            font-size: 1rem;
            margin-bottom: 36px;
            line-height: 1.7;
            color: var(--text-muted);
            font-weight: 300;
        }

        .bio .tag {
            color: #fff;
            font-weight: 500;
            padding: 4px 12px;
            background: linear-gradient(135deg, rgba(139,92,246,0.25), rgba(232,121,249,0.18));
            border-radius: 999px;
            border: 1px solid rgba(167,139,250,0.35);
            display: inline-block;
            margin: 2px;
            white-space: nowrap;
            transition: transform .2s ease, border-color .2s ease;
        }
        .bio .tag:hover { transform: translateY(-2px); border-color: rgba(232,121,249,0.6); }

        /* Stats */
        .stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-bottom: 32px;
        }

        .stat-item {
            padding: 16px 8px;
            border-radius: 16px;
            background: rgba(255,255,255,0.025);
            border: 1px solid var(--glass-border);
            transition: transform .25s ease, background .25s ease, border-color .25s ease;
        }

        .stat-item:hover {
            transform: translateY(-2px);
            background: rgba(255,255,255,0.045);
            border-color: rgba(167,139,250,0.3);
        }

        .stat-number {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1.6rem;
            font-weight: 600;
            letter-spacing: -0.01em;
            background: linear-gradient(135deg, #ffffff, #c4b5fd);
            -webkit-background-clip: text;
                    background-clip: text;
            -webkit-text-fill-color: transparent;
            color: transparent;
            margin-bottom: 2px;
        }

        .stat-label {
            font-size: 10px;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 2px;
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 500;
        }

        /* Social */
        .social-links {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-bottom: 32px;
        }

        .social-link {
            position: relative;
            width: 46px;
            height: 46px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            color: #fff;
            background: rgba(255,255,255,0.04);
            border: 1px solid var(--glass-border);
            transition: transform .25s ease, background .25s ease, border-color .25s ease, box-shadow .25s ease;
        }

        .social-link:hover {
            transform: translateY(-4px);
            background: linear-gradient(135deg, rgba(139,92,246,0.25), rgba(232,121,249,0.2));
            border-color: rgba(167,139,250,0.5);
            box-shadow: 0 10px 30px -10px rgba(139,92,246,0.5);
        }

        .social-link svg { width: 18px; height: 18px; }

        /* Tooltip */
        .social-link::after {
            content: attr(data-label);
            position: absolute;
            bottom: calc(100% + 8px);
            left: 50%;
            transform: translateX(-50%) translateY(4px);
            font-family: 'Space Grotesk', sans-serif;
            font-size: 10px;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--text-muted);
            background: rgba(20,16,32,0.9);
            border: 1px solid var(--glass-border);
            border-radius: 8px;
            padding: 5px 10px;
            white-space: nowrap;
            opacity: 0;
            pointer-events: none;
            transition: opacity .2s ease, transform .2s ease;
        }
        .social-link:hover::after {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        /* Back button */
        .back-button {
            position: relative;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 14px 28px;
            font-family: 'Space Grotesk', sans-serif;
            font-size: 0.85rem;
            font-weight: 500;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--text);
            background: rgba(255,255,255,0.04);
            border: 1px solid var(--glass-border);
            border-radius: 999px;
            cursor: pointer;
            overflow: hidden;
            transition: transform .25s ease, background .25s ease, border-color .25s ease;
        }

        .back-button:hover {
            transform: translateY(-2px);
            background: rgba(255,255,255,0.08);
            border-color: rgba(167,139,250,0.4);
        }
        .back-button .arrow { transition: transform .25s ease; }
        .back-button:hover .arrow { transform: translateX(-4px); }

        /* Loading screen */
        .loading-screen {
            position: fixed;
            inset: 0;
            background: var(--bg);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            z-index: 1000;
            transition: opacity .8s ease;
        }
        .loading-screen.hidden { opacity: 0; pointer-events: none; }
        .loading-text {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 13px;
            color: var(--text-muted);
            margin-bottom: 24px;
            letter-spacing: 8px;
            text-transform: uppercase;
            font-weight: 500;
        }
        .loading-bar {
            width: 220px; height: 2px;
            background: rgba(255,255,255,0.08);
            border-radius: 2px;
            overflow: hidden;
        }
        .loading-progress {
            height: 100%; width: 0%;
            background: linear-gradient(90deg, #8b5cf6, #e879f9, #22d3ee);
            border-radius: 2px;
            animation: loadingProgress 1.4s ease forwards;
        }
        @keyframes loadingProgress { to { width: 100%; } }

        @media (max-width: 520px) {
            .profile-card { padding: 44px 24px 32px; border-radius: 22px; }
            .avatar-container { width: 128px; height: 128px; }
            .stats { gap: 8px; }
            .stat-item { padding: 12px 6px; }
        }

        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after { animation: none !important; transition: none !important; }
        }
    </style>
</head>

        <button class="back-button" onclick="goBack()" type="button">
            <span class="arrow" aria-hidden="true">←</span>
            <span>Назад</span>
        </button>
    </main>

    <script>
        function createParticles() {
            const container = document.getElementById('particles');
            const count = 30;
            for (let i = 0; i < count; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                const size = 2 + Math.random() * 4;
                p.style.width = size + 'px';
                p.style.height = size + 'px';
                p.style.left = Math.random() * 100 + '%';
                p.style.animationDuration = (14 + Math.random() * 14) + 's';
                p.style.animationDelay = (-Math.random() * 20) + 's';
                p.style.opacity = String(0.3 + Math.random() * 0.6);
                container.appendChild(p);
            }
        }

        function goBack() {
            document.body.style.transition = 'opacity .4s ease';
            document.body.style.opacity = '0';
            setTimeout(() => { window.location.href = 'index.html'; }, 380);
        }

        function hideLoader() {
            const ls = document.getElementById('loadingScreen');
            if (ls) ls.classList.add('hidden');
        }

        document.addEventListener('DOMContentLoaded', () => {
            createParticles();
            setTimeout(hideLoader, 1000);
        });
    </script>
</body>
</html>
