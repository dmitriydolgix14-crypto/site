<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>@whitekrestik</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
        }

        .profile-card {
            position: relative;
            z-index: 1;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 60px 50px;
            max-width: 500px;
            width: 100%;
            text-align: center;
            box-shadow: 0 0 100px rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            animation: fadeIn 1.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .avatar-container {
            position: relative;
            width: 180px;
            height: 180px;
            margin: 0 auto 40px;
        }

        .avatar {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid rgba(255, 255, 255, 0.2);
            filter: grayscale(100%);
            transition: all 0.3s ease;
        }

        .avatar:hover {
            filter: grayscale(0%);
            border-color: rgba(255, 255, 255, 0.4);
        }

        .status-dot {
            position: absolute;
            bottom: 10px;
            right: 10px;
            width: 20px;
            height: 20px;
            background: #fff;
            border-radius: 50%;
            border: 3px solid #000;
        }

        .username {
            font-size: 2.5em;
            margin-bottom: 15px;
            font-weight: 300;
            letter-spacing: 4px;
            color: #fff;
            text-shadow: 0 0 10px #8b5cf6, 0 0 20px #8b5cf6, 0 0 30px #8b5cf6;
            animation: neonPulse 2s ease-in-out infinite alternate;
        }

        @keyframes neonPulse {
            from {
                text-shadow: 0 0 10px #8b5cf6, 0 0 20px #8b5cf6, 0 0 30px #8b5cf6;
            }
            to {
                text-shadow: 0 0 20px #a78bfa, 0 0 30px #a78bfa, 0 0 40px #a78bfa;
            }
        }

        .bio {
            font-size: 1.1em;
            margin-bottom: 50px;
            line-height: 1.8;
            opacity: 0.9;
            font-weight: 300;
            color: #e0e0e0;
        }

        .bio span {
            color: #fff;
            font-weight: 400;
            padding: 4px 12px;
            background: rgba(139, 92, 246, 0.2);
            border-radius: 20px;
            border: 1px solid rgba(139, 92, 246, 0.3);
            text-shadow: 0 0 10px rgba(139, 92, 246, 0.5);
            display: inline-block;
            margin: 0 4px;
        }

        .stats {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin-bottom: 50px;
        }

        .stat-item {
            text-align: center;
        }

        .stat-number {
            font-size: 2em;
            font-weight: 300;
            margin-bottom: 5px;
        }

        .stat-label {
            font-size: 0.8em;
            opacity: 0.5;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .social-links {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 40px;
        }

        .social-link {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            transition: all 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff;
        }

        .social-link:hover {
            background: #fff;
            color: #000;
            transform: translateY(-5px);
        }

        .back-button {
            padding: 15px 40px;
            background: transparent;
            border: 2px solid rgba(255, 255, 255, 0.3);
            color: #fff;
            cursor: pointer;
            font-size: 1em;
            transition: all 0.4s ease;
            font-weight: 300;
            letter-spacing: 3px;
            text-transform: uppercase;
            position: relative;
            overflow: hidden;
        }

        .back-button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: #fff;
            transition: left 0.4s ease;
            z-index: -1;
        }

        .back-button:hover {
            color: #000;
            border-color: #fff;
        }

        .back-button:hover::before {
            left: 0;
        }

        /* Загрузочный экран */
        .loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            flex-direction: column;
            transition: opacity 0.8s ease;
        }

        .loading-screen.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .loading-text {
            font-size: 1.5em;
            color: #fff;
            margin-bottom: 40px;
            letter-spacing: 8px;
            text-transform: uppercase;
            font-weight: 300;
        }

        .loading-bar {
            width: 200px;
            height: 2px;
            background: rgba(255, 255, 255, 0.1);
            position: relative;
        }

        .loading-progress {
            height: 100%;
            background: #fff;
            animation: loadingProgress 2s ease forwards;
            width: 0%;
        }

        @keyframes loadingProgress {
            to { width: 100%; }
        }

        /* Декоративные элементы */
        .decoration {
            position: fixed;
            width: 400px;
            height: 400px;
            border: 1px solid rgba(139, 92, 246, 0.1);
            border-radius: 50%;
            animation: rotate 30s linear infinite;
            box-shadow: 0 0 50px rgba(139, 92, 246, 0.1);
        }

        .decoration:nth-child(1) {
            top: -200px;
            right: -200px;
        }

        .decoration:nth-child(2) {
            bottom: -200px;
            left: -200px;
            animation-direction: reverse;
        }

        .decoration:nth-child(3) {
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 600px;
            height: 600px;
            border: 1px solid rgba(139, 92, 246, 0.05);
            animation: rotate 40s linear infinite reverse;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* Частицы */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: rgba(139, 92, 246, 0.6);
            border-radius: 50%;
            animation: float 20s infinite;
        }

        @keyframes float {
            0%, 100% {
                transform: translateY(100vh) rotate(0deg);
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
            100% {
                transform: translateY(-100vh) rotate(720deg);
                opacity: 0;
            }
        }
    </style>
</head>

    <script>
        // Создание частиц
        function createParticles() {
            const container = document.getElementById('particles');
            const particleCount = 40;

            for (let i = 0; i < particleCount; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.animationDelay = Math.random() * 20 + 's';
                particle.style.animationDuration = (15 + Math.random() * 10) + 's';
                particle.style.width = (3 + Math.random() * 4) + 'px';
                particle.style.height = particle.style.width;
                container.appendChild(particle);
            }
        }

        // Инициализация
        document.addEventListener('DOMContentLoaded', () => {
            createParticles();
        });

        // Изменяем URL без перезагрузки
        history.pushState({}, '', '/profile');
    </script>
