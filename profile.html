<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>@whitekrestik</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            overflow: hidden;
        }

        body::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(233, 69, 96, 0.1) 0%, transparent 50%);
            animation: rotate 20s linear infinite;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .profile-container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border-radius: 30px;
            padding: 50px 40px;
            max-width: 550px;
            width: 100%;
            text-align: center;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5),
                        0 0 100px rgba(233, 69, 96, 0.2),
                        inset 0 0 60px rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            animation: fadeIn 1s ease-in;
            position: relative;
            z-index: 1;
        }

        .profile-container::before {
            content: '';
            position: absolute;
            top: -2px;
            left: -2px;
            right: -2px;
            bottom: -2px;
            background: linear-gradient(45deg, #e94560, #0f3460, #e94560);
            border-radius: 32px;
            z-index: -1;
            opacity: 0.5;
            animation: borderGlow 3s ease-in-out infinite;
        }

        @keyframes borderGlow {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 0.7; }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .profile-photo {
            width: 180px;
            height: 180px;
            border-radius: 50%;
            margin: 0 auto 30px;
            border: 5px solid transparent;
            background: linear-gradient(#0f0c29, #0f0c29) padding-box,
                        linear-gradient(135deg, #e94560, #0f3460, #e94560) border-box;
            overflow: hidden;
            box-shadow: 0 0 40px rgba(233, 69, 96, 0.4),
                        0 0 80px rgba(233, 69, 96, 0.2);
            animation: pulse 2s infinite, float 3s ease-in-out infinite;
            position: relative;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        @keyframes pulse {
            0%, 100% {
                box-shadow: 0 0 20px rgba(233, 69, 96, 0.5);
            }
            50% {
                box-shadow: 0 0 30px rgba(233, 69, 96, 0.8);
            }
        }

        .profile-photo img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .username {
            font-size: 2.5em;
            margin-bottom: 15px;
            color: #e94560;
            text-shadow: 0 0 20px rgba(233, 69, 96, 0.8),
                         0 0 40px rgba(233, 69, 96, 0.4);
            font-weight: 700;
            letter-spacing: 2px;
        }

        .bio {
            font-size: 1.2em;
            margin-bottom: 40px;
            line-height: 1.8;
            color: #b8b8b8;
            font-weight: 300;
            letter-spacing: 0.5px;
        }

        .bio span {
            color: #e94560;
            font-weight: 600;
            text-shadow: 0 0 10px rgba(233, 69, 96, 0.5);
            padding: 2px 8px;
            background: rgba(233, 69, 96, 0.1);
            border-radius: 5px;
        }

        .social-links {
            display: flex;
            justify-content: center;
            gap: 25px;
            margin-top: 40px;
        }

        .social-icon {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            font-size: 28px;
            color: #fff;
            position: relative;
            overflow: hidden;
        }

        .social-icon::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, rgba(255,255,255,0.3), transparent);
            opacity: 0;
            transition: opacity 0.3s;
        }

        .social-icon:hover::before {
            opacity: 1;
        }

        .telegram {
            background: linear-gradient(135deg, #0088cc, #00aaff);
            box-shadow: 0 10px 30px rgba(0, 136, 204, 0.4);
        }

        .discord {
            background: linear-gradient(135deg, #7289da, #5865F2);
            box-shadow: 0 10px 30px rgba(114, 137, 218, 0.4);
        }

        .soundcloud {
            background: linear-gradient(135deg, #ff5500, #ff7700);
            box-shadow: 0 10px 30px rgba(255, 85, 0, 0.4);
        }

        .social-icon:hover {
            transform: scale(1.15) translateY(-5px);
            box-shadow: 0 15px 40px rgba(255, 255, 255, 0.3);
        }

        .back-button {
            margin-top: 40px;
            padding: 15px 40px;
            background: rgba(233, 69, 96, 0.15);
            border: 2px solid #e94560;
            color: #e94560;
            border-radius: 30px;
            cursor: pointer;
            font-size: 1.1em;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            font-weight: 600;
            letter-spacing: 1px;
            position: relative;
            overflow: hidden;
        }

        .back-button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(233, 69, 96, 0.3), transparent);
            transition: left 0.5s;
        }

        .back-button:hover::before {
            left: 100%;
        }

        .back-button:hover {
            background: #e94560;
            color: #fff;
            box-shadow: 0 10px 30px rgba(233, 69, 96, 0.5);
            transform: translateY(-3px);
        }

        .glitch-effect {
            position: relative;
        }

        .glitch-effect::before,
        .glitch-effect::after {
            content: attr(data-text);
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        .glitch-effect::before {
            animation: glitch-1 0.3s infinite;
            color: #ff0000;
            z-index: -1;
            opacity: 0.7;
        }

        .glitch-effect::after {
            animation: glitch-2 0.3s infinite;
            color: #00ffff;
            z-index: -2;
            opacity: 0.7;
        }

        @keyframes glitch-1 {
            0%, 100% {
                transform: translate(0);
            }
            20% {
                transform: translate(-2px, 2px);
            }
            40% {
                transform: translate(-2px, -2px);
            }
            60% {
                transform: translate(2px, 2px);
            }
            80% {
                transform: translate(2px, -2px);
            }
        }

        @keyframes glitch-2 {
            0%, 100% {
                transform: translate(0);
            }
            20% {
                transform: translate(2px, -2px);
            }
            40% {
                transform: translate(2px, 2px);
            }
            60% {
                transform: translate(-2px, -2px);
            }
            80% {
                transform: translate(-2px, 2px);
            }
        }

        /* Частицы на фоне */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: rgba(233, 69, 96, 0.6);
            border-radius: 50%;
            animation: particleFloat 15s infinite;
        }

        @keyframes particleFloat {
            0%, 100% {
                transform: translateY(100vh) rotate(0deg);
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
            100% {
                transform: translateY(-100vh) rotate(720deg);
                opacity: 0;
            }
        }
    </style>
</head>

    <script>
        // Создание частиц на фоне
        function createParticles() {
            const particlesContainer = document.getElementById('particles');
            const particleCount = 50;

            for (let i = 0; i < particleCount; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.animationDelay = Math.random() * 15 + 's';
                particle.style.animationDuration = (10 + Math.random() * 10) + 's';
                particlesContainer.appendChild(particle);
            }
        }

        // Попробуем получить фото из localStorage или используем placeholder
        const savedPhoto = localStorage.getItem('profilePhoto');
        if (savedPhoto) {
            document.getElementById('profileImage').src = savedPhoto;
        }

        // Эффект появления
        document.addEventListener('DOMContentLoaded', () => {
            createParticles();
            const container = document.querySelector('.profile-container');
            container.style.opacity = '0';
            setTimeout(() => {
                container.style.opacity = '1';
            }, 100);
        });
    </script>
